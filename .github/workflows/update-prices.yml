name: Update Xbox Game Pass Prices

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Archive previous data
        run: |
          mkdir -p archive
          timestamp=$(date +%Y%m%d_%H%M%S)
          if [ -f xbox_gamepass_prices.json ]; then
            cp xbox_gamepass_prices.json archive/xbox_gamepass_prices_${timestamp}.json
          fi

      - name: Scrape prices
        run: python xbox_scraper.py

      - name: Convert to CNY and generate ranking
        env:
          API_KEY: ${{ secrets.OPENEXCHANGERATES_API_KEY }}
        run: python xbox_rate_converter.py

      - name: Detect price changes and update changelog
        run: python xbox_price_change_detector.py

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add xbox_gamepass_prices.json xbox_gamepass_prices_processed.json CHANGELOG.md archive/
          git add xbox_price_changes_latest.json 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "chore: update Xbox Game Pass prices - $(date -u +%Y-%m-%d)" && git push
