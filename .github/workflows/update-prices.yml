name: Weekly Xbox Game Pass Price Scraper

on:
  schedule:
    # Every Sunday at UTC 9:00 (Beijing time 17:00)
    - cron: '0 9 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  id-token: write

env:
  TZ: Asia/Shanghai

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Archive previous data
        run: |
          mkdir -p archive
          timestamp=$(date +%Y%m%d_%H%M%S)
          if [ -f xbox_gamepass_prices.json ]; then
            cp xbox_gamepass_prices.json archive/xbox_gamepass_prices_${timestamp}.json
          fi

      - name: Scrape prices
        id: scraper
        run: |
          echo "Starting Xbox Game Pass price scraper..."
          python xbox_scraper.py
          echo "scraper_status=success" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check scraper output
        run: |
          if [ -f "xbox_gamepass_prices.json" ]; then
            echo "Scraper output file generated successfully"
            ls -la xbox_gamepass_prices.json
          else
            echo "Scraper output file not found"
            exit 1
          fi

      - name: Convert to CNY and generate ranking
        id: converter
        env:
          API_KEY: ${{ secrets.OPENEXCHANGERATES_API_KEY }}
        run: |
          echo "Starting CNY conversion and ranking..."
          python xbox_rate_converter.py
          echo "converter_status=success" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check converter output
        run: |
          if [ -f "xbox_gamepass_prices_processed.json" ]; then
            echo "Processed file generated successfully"
            ls -la xbox_gamepass_prices_processed.json
          else
            echo "Processed file not found"
            exit 1
          fi

      - name: Detect price changes and update changelog
        id: price_changes
        if: steps.scraper.outputs.scraper_status == 'success' && steps.converter.outputs.converter_status == 'success'
        run: |
          echo "Detecting price changes..."
          python xbox_price_change_detector.py
          if [ ! -f "$GITHUB_OUTPUT" ] || ! grep -q "changes_count=" "$GITHUB_OUTPUT" 2>/dev/null; then
            echo "changes_count=0" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Check for changes
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "File changes detected"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No file changes"
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add xbox_gamepass_prices.json xbox_gamepass_prices_processed.json CHANGELOG.md archive/
          git add xbox_price_changes_latest.json 2>/dev/null || true

          COMMIT_MSG="chore: update Xbox Game Pass prices - $(date -u +%Y-%m-%d)"
          CHANGES_COUNT="${{ steps.price_changes.outputs.changes_count }}"
          if [ "$CHANGES_COUNT" != "0" ] && [ "$CHANGES_COUNT" != "" ]; then
            COMMIT_MSG="${COMMIT_MSG} [${CHANGES_COUNT} price changes detected]"
          fi

          git commit -m "${COMMIT_MSG}"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:master
          echo "Changes committed and pushed"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: xbox-price-data-${{ github.run_number }}
          path: |
            xbox_gamepass_prices.json
            xbox_gamepass_prices_processed.json
            xbox_price_changes_latest.json
            CHANGELOG.md
          retention-days: 30

      - name: Job summary
        if: always()
        run: |
          echo "## Xbox Game Pass Price Scraper Report" >> $GITHUB_STEP_SUMMARY
          echo "**Run time:** $(date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_STEP_SUMMARY
          echo "**Scraper status:** ${{ steps.scraper.outputs.scraper_status || 'failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Converter status:** ${{ steps.converter.outputs.converter_status || 'failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "**File changes:** ${{ steps.check_changes.outputs.changes || 'false' }}" >> $GITHUB_STEP_SUMMARY

          CHANGES_COUNT="${{ steps.price_changes.outputs.changes_count }}"
          if [ "$CHANGES_COUNT" != "" ] && [ "$CHANGES_COUNT" != "0" ]; then
            echo "**Price changes:** $CHANGES_COUNT changes detected" >> $GITHUB_STEP_SUMMARY
          elif [ "$CHANGES_COUNT" = "0" ]; then
            echo "**Price changes:** No changes" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Price changes:** Detection failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "xbox_gamepass_prices_processed.json" ]; then
            echo "**Output file size:** $(du -h xbox_gamepass_prices_processed.json | cut -f1)" >> $GITHUB_STEP_SUMMARY
          fi

          ARCHIVE_COUNT=$(ls archive/xbox_gamepass_prices_*.json 2>/dev/null | wc -l)
          echo "**Archive files:** ${ARCHIVE_COUNT} total" >> $GITHUB_STEP_SUMMARY
